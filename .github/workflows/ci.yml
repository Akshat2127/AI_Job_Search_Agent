name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Backend tests
        run: python -m pytest -q
      - name: Backend lint and formatting
        run: |
          ruff check backend tests scripts playwright
          ruff format --check backend tests scripts playwright
      - name: Backend type check
        run: mypy backend/app
      - name: Runtime smoke test
        run: python -m scripts.smoke_test
      - name: Frontend checks
        run: |
          npm --prefix frontend run lint
          npm --prefix frontend run typecheck
          npm --prefix frontend test
          npm --prefix frontend run build
      - name: Dependency audit
        run: npm --prefix frontend audit --audit-level=high
      - name: Compose validation
        run: docker compose config -q
